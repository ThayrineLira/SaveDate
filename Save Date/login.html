<!doctype html>
<html lang="pt-br">

<head>

  <!-- ==========================================
       CONFIGURAÇÕES DA PÁGINA
  =========================================== -->

  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- CSS -->
  <link rel="stylesheet" href="css/login.css" />

  <title>
    Save Date
  </title>

</head>

<body>

  <!-- ==========================================
       CONTAINER PRINCIPAL
  =========================================== -->

  <div class="texto">

    <!-- ==========================================
         TOPO / LOGO
    =========================================== -->

    <header class="topo">

      <div class="logo-area">

        <!-- LOGO -->

        <img src="img/logo.png" alt="Logo Save Date" class="logo" />

        <!-- TÍTULO -->

        <h1 class="titulo">
          SAVE DATE
        </h1>

        <!-- SUBTÍTULO -->

        <p class="subtitulo">

          <small>
            SALVA ENCONTROS
          </small>

        </p>

      </div>

      <!-- TÍTULO LOGIN -->

      <h2>
        Login
      </h2>

    </header>

    <!-- ==========================================
         FORMULÁRIO LOGIN
    =========================================== -->

    <form id="form-login" class="login-form">

      <!-- EMAIL -->

      <input type="email" id="email" name="email" placeholder="Email cadastrado" required />

      <!-- SENHA -->

      <input type="password" id="senha" name="senha" placeholder="Senha" required />

      <!-- ==========================================
           OPÇÕES LOGIN
      =========================================== -->

      <div class="opcao-login">

        <!-- LEMBRAR -->

        <label>

          <input type="checkbox" id="remember" name="remember" />

          Lembrar de mim

        </label>

        <!-- ESQUECI SENHA -->

        <a href="esqueci.html">
          Esqueceu a senha?
        </a>

      </div>

      <!-- BOTÃO LOGIN -->

      <button type="submit" class="botao">
        Entrar
      </button>

    </form>

    <!-- ==========================================
         CADASTRO
    =========================================== -->

    <div class="cadastro">

      <p>
        Não tem conta?
      </p>

      <a href="tipo-de-conta.html">

        <small>
          Cadastre-se aqui
        </small>

      </a>

    </div>

  </div>

  <!-- ==========================================
       JAVASCRIPT
  =========================================== -->

  <script>

    /* ==========================================
         ELEMENTOS
    =========================================== */

    const formulario =
      document.getElementById(
        "form-login"
      );

    const emailInput =
      document.getElementById(
        "email"
      );

    const senhaInput =
      document.getElementById(
        "senha"
      );

    const rememberInput =
      document.getElementById(
        "remember"
      );


    /* ==========================================
         TOAST
    =========================================== */

    function mostrarToast(
      mensagem,
      tipo = "sucesso"
    ) {

      const container =
        document.getElementById(
          "toast-container"
        );

      const toast =
        document.createElement(
          "div"
        );

      toast.className =
        `toast toast-${tipo}`;

      toast.textContent =
        mensagem;

      container.appendChild(
        toast
      );

      setTimeout(() => {

        toast.classList.add(
          "mostrar"
        );

      }, 100);

      setTimeout(() => {

        toast.classList.remove(
          "mostrar"
        );

        setTimeout(() => {

          toast.remove();

        }, 300);

      }, 3000);
    }


    /* ==========================================
         RECUPERA LOGIN SALVO
    =========================================== */

    window.onload = function () {

      const emailSalvo =
        localStorage.getItem(
          "email"
        );

      const senhaSalva =
        localStorage.getItem(
          "senha"
        );

      if (
        emailSalvo &&
        senhaSalva
      ) {

        emailInput.value =
          emailSalvo;

        senhaInput.value =
          senhaSalva;

        rememberInput.checked =
          true;
      }
    };


    /* ==========================================
         LOGIN
    =========================================== */

    formulario.addEventListener(
      "submit",

      function (event) {

        event.preventDefault();

        const email =
          emailInput.value.trim();

        const senha =
          senhaInput.value.trim();

        const usuarioCadastrado =
          localStorage.getItem(
            "usuarioCadastro"
          );

        const senhaCadastrada =
          localStorage.getItem(
            "senhaCadastro"
          );

        /* ==========================================
             SEM CADASTRO
        =========================================== */

        if (
          !usuarioCadastrado ||
          !senhaCadastrada
        ) {

          mostrarToast(
            "Você precisa criar uma conta primeiro.",
            "erro"
          );

          setTimeout(() => {

            window.location.href =
              "tipo-de-conta.html";

          }, 1500);

          return;
        }

        /* ==========================================
             LOGIN CORRETO
        =========================================== */

        if (
          email === usuarioCadastrado &&
          senha === senhaCadastrada
        ) {

          mostrarToast(
            "Login realizado com sucesso!",
            "sucesso"
          );

          localStorage.setItem(
            "usuarioLogado",
            "true"
          );

          localStorage.setItem(
            "nomeUsuario",
            email
          );

          if (
            rememberInput.checked
          ) {

            localStorage.setItem(
              "email",
              email
            );

            localStorage.setItem(
              "senha",
              senha
            );

          }

          else {

            localStorage.removeItem(
              "email"
            );

            localStorage.removeItem(
              "senha"
            );
          }

          setTimeout(() => {

            window.location.href =
              "home.html";

          }, 1500);
        }

        /* ==========================================
             LOGIN INCORRETO
        =========================================== */

        else {

          mostrarToast(
            "Email ou senha incorretos.",
            "erro"
          );
        }
      }
    );

  </script>

  <!-- TOAST -->
  <div id="toast-container"></div>

</body>

</html>
