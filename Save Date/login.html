<!doctype html>
<html lang="pt-br">

<head>

  <!-- ==========================================
       CONFIGURAÇÕES DA PÁGINA
  =========================================== -->

  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- CSS -->
  <link rel="stylesheet" href="css/login.css" />

  <title>
    Save Date
  </title>

</head>

<body>

  <!-- ==========================================
       CONTAINER PRINCIPAL
  =========================================== -->

  <div class="texto">

    <!-- ==========================================
         TOPO / LOGO
    =========================================== -->

    <header class="topo">

      <div class="logo-area">

        <!-- LOGO -->

        <img src="img/optimized/logo.png" alt="Logo Save Date" class="logo" />

        <!-- TÍTULO -->

        <h1 class="titulo">
          SAVE DATE
        </h1>

        <!-- SUBTÍTULO -->

        <p class="subtitulo">

          <small>
            SALVA ENCONTROS
          </small>

        </p>

      </div>

      <!-- TÍTULO LOGIN -->

      <h2>
        Login
      </h2>

    </header>

    <!-- ==========================================
         FORMULÁRIO LOGIN
    =========================================== -->

    <form id="form-login" class="login-form">

      <!-- EMAIL -->

      <input type="email" id="email" name="email" placeholder="Email cadastrado" required />

      <!-- SENHA -->

      <input type="password" id="senha" name="senha" placeholder="Senha" required />

      <!-- ==========================================
           OPÇÕES LOGIN
      =========================================== -->

      <div class="opcao-login">

        <!-- LEMBRAR -->

        <label>

          <input type="checkbox" id="remember" name="remember" />

          Lembrar de mim

        </label>

        <!-- ESQUECI SENHA -->

        <a href="esqueci.html">
          Esqueceu a senha?
        </a>

      </div>

      <!-- BOTÃO LOGIN -->

      <button type="submit" class="botao">
        Entrar
      </button>
    
      <button
  type="button"
  class="botao"
  onclick="window.location.href='home.html'">
   Voltar
</button>

    </form>

    <!-- ==========================================
         CADASTRO
    =========================================== -->

    <div class="cadastro">

      <p>
        Não tem conta?
      </p>

      <a href="tipo-de-conta.html">

        <small>
          Cadastre-se aqui
        </small>

      </a>

    </div>

  </div>

  <!-- ==========================================
       JAVASCRIPT
  =========================================== -->

  <script src="js/premium.js"></script>
  <script>

    /* ==========================================
         ELEMENTOS
    =========================================== */

    const formulario =
      document.getElementById(
        "form-login"
      );

    const emailInput =
      document.getElementById(
        "email"
      );

    const senhaInput =
      document.getElementById(
        "senha"
      );

    const rememberInput =
      document.getElementById(
        "remember"
      );
    function pegarCadastrosUsuarios() {
      return JSON.parse(
        localStorage.getItem("cadastrosUsuarios") || "[]"
      );
    }

    function garantirContaAdmin() {
      const usuarios = pegarCadastrosUsuarios();
      const emailAdmin = "admin@savedate.com";
      const adminExistente = usuarios.find(
        (item) => item.email === emailAdmin
      );

      if (adminExistente) {
        adminExistente.nome = "Administrador";
        adminExistente.senha = "Admin@123";
        adminExistente.tipo = "admin";
      } else {
        usuarios.push({
          nome: "Administrador",
          email: emailAdmin,
          senha: "Admin@123",
          tipo: "admin"
        });
      }

      localStorage.setItem("cadastrosUsuarios", JSON.stringify(usuarios));
    }

    function pegarCadastrosEstabelecimentos() {
      return JSON.parse(
        localStorage.getItem("cadastrosEstabelecimentos") || "[]"
      );
    }

    function buscarCadastroPorEmail(email) {
      const emailNormalizado =
        email.toLowerCase();

      if (emailNormalizado === "admin@savedate.com") {
        return {
          tipo: "admin",
          nome: "Administrador",
          senha: "Admin@123"
        };
      }

      const usuarios = pegarCadastrosUsuarios();
      const estabelecimentos = pegarCadastrosEstabelecimentos();

      const usuario = usuarios.find(
        (item) => item.email === emailNormalizado
      );
      if (usuario) {
        return {
          tipo: usuario.tipo || "usuario",
          nome: usuario.nome,
          senha: usuario.senha
        };
      }

      const estabelecimento = estabelecimentos.find(
        (item) => item.email === emailNormalizado
      );
      if (estabelecimento) {
        return {
          tipo: "estabelecimento",
          nome: estabelecimento.nome,
          senha: estabelecimento.senha
        };
      }

      const usuarioCadastroEmail =
        localStorage.getItem("usuarioCadastroEmail") ||
        localStorage.getItem("usuarioCadastro");
      const usuarioCadastroSenha =
        localStorage.getItem("usuarioCadastroSenha") ||
        localStorage.getItem("senhaCadastro");
      const estabelecimentoCadastroEmail =
        localStorage.getItem("estabelecimentoCadastroEmail");
      const estabelecimentoCadastroSenha =
        localStorage.getItem("estabelecimentoCadastroSenha");

      if (
        usuarioCadastroEmail &&
        emailNormalizado === usuarioCadastroEmail.toLowerCase()
      ) {
        return {
          tipo: "usuario",
          nome:
            localStorage.getItem("usuarioCadastroNome") ||
            localStorage.getItem("nomeCadastro") ||
            email,
          senha: usuarioCadastroSenha
        };
      }

      if (
        estabelecimentoCadastroEmail &&
        emailNormalizado === estabelecimentoCadastroEmail.toLowerCase()
      ) {
        return {
          tipo: "estabelecimento",
          nome:
            localStorage.getItem("estabelecimentoCadastroNome") ||
            localStorage.getItem("nomeCadastro") ||
            email,
          senha: estabelecimentoCadastroSenha
        };
      }

      return null;
    }

    /* ==========================================
         TOAST
    =========================================== */

    function mostrarToast(
      mensagem,
      tipo = "sucesso"
    ) {

      const container =
        document.getElementById(
          "toast-container"
        );

      if (!container) {
        return;
      }

      const toast =
        document.createElement(
          "div"
        );

      const emoji =
        tipo === "sucesso"
          ? "🎉"
          : tipo === "aviso"
          ? "💡"
          : "⚠️";

      toast.className =
        `toast toast-${tipo}`;

      toast.innerHTML =
        `<div class="toast-content">
           <span class="toast-emoji">${emoji}</span>
           <div class="toast-text">${mensagem}</div>
         </div>`;

      container.appendChild(
        toast
      );

      setTimeout(() => {

        toast.classList.add(
          "mostrar"
        );

      }, 100);

      setTimeout(() => {

        toast.classList.remove(
          "mostrar"
        );

        setTimeout(() => {

          toast.remove();

        }, 300);

      }, 3000);
    }


    /* ==========================================
         RECUPERA LOGIN SALVO
    =========================================== */

    window.onload = function () {
      garantirContaAdmin();

      const emailSalvo =
        localStorage.getItem(
          "email"
        );

      const senhaSalva =
        localStorage.getItem(
          "senha"
        );

      if (
        emailSalvo &&
        senhaSalva
      ) {

        emailInput.value =
          emailSalvo;

        senhaInput.value =
          senhaSalva;

        rememberInput.checked =
          true;
      }
    };


    /* ==========================================
         LOGIN
    =========================================== */

    formulario.addEventListener(
      "submit",

      function (event) {

        event.preventDefault();

        const email =
          emailInput.value.trim();

        const emailNormalizado =
          email.toLowerCase();

        const senha =
          senhaInput.value.trim();

        const registro = buscarCadastroPorEmail(
          email
        );

        /* ==========================================
             SEM CADASTRO
        =========================================== */

        if (!registro) {
          mostrarToast(
            "Parece que você ainda não tem conta. Vamos criar seu perfil?",
            "aviso"
          );

          setTimeout(() => {
            window.location.href =
              "tipo-de-conta.html";
          }, 1500);

          return;
        }

        /* ==========================================
             LOGIN CORRETO
        =========================================== */

        const tipoCadastro = registro.tipo;
        const nomeCadastrado = registro.nome || email;

        if (senha !== registro.senha) {
          mostrarToast(
            "E-mail ou senha incorretos. Verifique e tente novamente.",
            "erro"
          );
          return;
        }

        const mensagemLogin =
          tipoCadastro === "estabelecimento"
            ? `🎉 Bem-vindo, ${nomeCadastrado || "Estabelecimento"}! Seu perfil foi conectado.`
            : rememberInput.checked
            ? `🎉 Bem-vindo de volta${nomeCadastrado ? ", " + nomeCadastrado : ""}! Que bom ter você de volta.`
            : "Seja bem-vindo! Seu login foi realizado com sucesso.";

          mostrarToast(
            mensagemLogin,
            "sucesso"
          );

          localStorage.setItem(
            "usuarioLogado",
            "true"
          );

          localStorage.setItem(
            "usuarioTipo",
            tipoCadastro
          );

          localStorage.setItem(
            "nomeUsuario",
            nomeCadastrado ||
              email
          );

          localStorage.setItem(
            "usuarioLogadoEmail",
            emailNormalizado
          );

          if (tipoCadastro === "estabelecimento") {
            localStorage.setItem(
              "estabelecimentoCadastroEmail",
              emailNormalizado
            );
            localStorage.setItem(
              "estabelecimentoCadastroNome",
              nomeCadastrado || email
            );
          } else {
            localStorage.removeItem("estabelecimentoCadastroEmail");
            localStorage.removeItem("estabelecimentoCadastroSenha");
            localStorage.removeItem("estabelecimentoCadastroNome");
            localStorage.removeItem("estabelecimentoCadastroEndereco");
            localStorage.removeItem("estabelecimentoCadastroComplemento");
            localStorage.removeItem("estabelecimentoCadastroTelefone");
            localStorage.removeItem("estabelecimentoDados");
          }

          if (typeof sincronizarPremiumContaAtual === "function") {
            sincronizarPremiumContaAtual();
          }

          if (
            rememberInput.checked
          ) {

            localStorage.setItem(
              "email",
              email
            );

            localStorage.setItem(
              "senha",
              senha
            );

          }

          else {

            localStorage.removeItem(
              "email"
            );

            localStorage.removeItem(
              "senha"
            );
          }

          const destino =
            tipoCadastro === "admin"
              ? "admin.html"
              : "home.html";

          setTimeout(() => {
            window.location.href = destino;
          }, 1500);
        }


      
    );

  </script>

  <!-- TOAST -->
  <div id="toast-container"></div>

</body>

</html>
