<!DOCTYPE html>
<html lang="pt-br">

<head>
  <script src="js/tema.js"></script>

  <!-- ==========================================
       CONFIGURAÇÕES DA PÁGINA
  =========================================== -->

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    Cadastro - Save Date
  </title>

  <!-- CSS -->
  <link
    rel="stylesheet"
    href="css/cadastro.css"
  >

  <link rel="stylesheet" href="css/tema.css" />
</head>



<body>

  <!-- ==========================================
       CONTAINER PRINCIPAL
  =========================================== -->
  <div class="texto">


    <!-- ==========================================
         TOPO
    =========================================== -->
    <header class="topo">

      <div class="logo-area">

        <!-- LOGO -->
        <img
          src="img/optimized/logo.png"
          alt="Logo Save Date"
          class="logo"
        >

        <!-- TÍTULO -->
        <h1 class="titulo">
          SAVE DATE
        </h1>

        <!-- SUBTÍTULO -->
        <p class="subtitulo">

          <small>
            SALVA ENCONTROS
          </small>

        </p>

      </div>


      <!-- TÍTULO -->
      <h3>
        Cadastrar usuário:
      </h3>

    </header>



    <!-- ==========================================
         FORMULÁRIO
    =========================================== -->
    <form
      class="login-form"
      id="form-cadastro"
    >

      <!-- NOME -->
      <input
        type="text"
        id="nome"
        name="nome"
        placeholder="Nome/Usuário"
        autocomplete="name"
        minlength="2"
        required
      >


      <!-- EMAIL -->
      <input
        type="email"
        id="email"
        name="email"
        placeholder="Email"
        autocomplete="email"
        required
      >


      <!-- SENHA -->
      <input
        type="password"
        id="senha"
        name="senha"
        placeholder="Senha"
        autocomplete="new-password"
        minlength="6"
        aria-describedby="erroSenha"
        required
      >


      <!-- ERRO SENHA -->
      <div
        id="erroSenha"
        class="erro"
      ></div>

      <!-- MENSAGEM -->
      <div
        id="mensagemCadastro"
        class="mensagem"
      ></div>

      <!-- BOTÃO -->
      <button
        class="botao"
        type="submit"
      >

        Cadastrar

      </button>



      <!-- VOLTAR -->
      <button
        type="button"
        class="botao"
        onclick="window.location.href='tipo-de-conta.html'"
      >

        Voltar

      </button>

    </form>

    <nav class="auth-trust-links" aria-label="Links de confianca">
      <a href="privacidade.html">Privacidade</a>
      <a href="termos.html">Termos</a>
      <a href="suporte.html">Suporte</a>
    </nav>

  </div>





  <!-- ==========================================
       JAVASCRIPT
  =========================================== -->
  <script>

    function mostrarMensagemCadastro(texto, tipo = 'erro') {
      const mensagem = document.getElementById('mensagemCadastro');
      if (!mensagem) {
        return;
      }

      mensagem.textContent = texto;
      mensagem.className = 'mensagem ' + tipo;

      if (tipo === 'sucesso') {
        mensagem.style.display = 'block';
      }

      setTimeout(() => {
        mensagem.textContent = '';
        mensagem.className = 'mensagem';
      }, 3200);
    }

    /* ==========================================
       BUSCAR CEP
    =========================================== */

    function buscarCEP() {

      let cep =
        document
          .getElementById("cep")
          .value
          .replace("-", "");



      /* ==========================================
         VALIDA CEP
      =========================================== */

      if (cep.length !== 8) {

        mostrarMensagemCadastro("CEP inválido!", "erro");

        return;

      }



      /* ==========================================
         BUSCA VIA CEP
      =========================================== */

      fetch(`https://viacep.com.br/ws/${cep}/json/`)

        .then(resposta => resposta.json())

        .then(dados => {


          /* CEP NÃO ENCONTRADO */

          if (dados.erro) {

            mostrarMensagemCadastro("CEP não encontrado!", "erro");

            return;

          }



          /* PREENCHE ENDEREÇO */

          document.getElementById("endereco").value =

            dados.logradouro +
            ", " +
            dados.bairro +
            " - " +
            dados.localidade;

        })


        .catch(() => {

          mostrarMensagemCadastro("Erro ao buscar CEP", "erro");

        });

    }






    /* ==========================================
       CADASTRO
    =========================================== */

    document
      .getElementById("form-cadastro")

      .addEventListener("submit", function(event) {

        // Impede recarregar
        event.preventDefault();



        /* ==========================================
           PEGAR VALORES
        =========================================== */

        const nome =
          document.getElementById("nome").value;

        const email =
          document.getElementById("email").value;

        const senha =
          document.getElementById("senha").value;

        const erro =
          document.getElementById("erroSenha");



        /* ==========================================
           VALIDA SENHA
        =========================================== */

        /*
          REGRAS:
          - mínimo 6 caracteres
          - pelo menos 1 letra
          - pelo menos 1 símbolo
        */

        const regex =
          /^(?=.*[A-Za-z])(?=.*[@$!%*#?&]).{6,}$/;



        /* ==========================================
           SENHA INVÁLIDA
        =========================================== */

        if (!regex.test(senha)) {

          erro.innerText =
            "Mínimo 6 caracteres, 1 letra e 1 símbolo.";

          return;

        }



        /* ==========================================
           LIMPA ERRO
        =========================================== */

        erro.innerText = "";



        /* ==========================================
           SALVA CADASTRO
        =========================================== */

        const usuarios =
          JSON.parse(
            localStorage.getItem(
              "cadastrosUsuarios"
            ) || "[]"
          );
        const estabelecimentos =
          JSON.parse(
            localStorage.getItem(
              "cadastrosEstabelecimentos"
            ) || "[]"
          );

        const emailNormalizado = email.toLowerCase();
        const emailExistente = emailNormalizado === "admin@savedate.com" || usuarios.some(
          (usuario) =>
            usuario.email ===
            emailNormalizado
        ) || estabelecimentos.some(
          (estabelecimento) =>
            estabelecimento.email ===
            emailNormalizado
        );

        if (emailExistente) {
          mostrarMensagemCadastro(
            "Já existe cadastro com este e-mail. Se não lembra a senha, você será redirecionado para redefinir.",
            "erro"
          );

          setTimeout(() => {
            window.location.href =
              "esqueci.html";
          }, 2600);

          return;
        }

        usuarios.push({
          nome,
          email: emailNormalizado,
          senha,
          tipo: "usuario"
        });

        localStorage.setItem(
          "cadastrosUsuarios",
          JSON.stringify(usuarios)
        );

        localStorage.setItem(
          "usuarioCadastroEmail",
          emailNormalizado
        );

        localStorage.setItem(
          "usuarioCadastroSenha",
          senha
        );

        localStorage.setItem(
          "usuarioCadastroNome",
          nome
        );

        localStorage.setItem(
          "tipoCadastro",
          "usuario"
        );

        localStorage.setItem(
          "usuarioTipo",
          "usuario"
        );

        localStorage.removeItem("estabelecimentoCadastroEmail");
        localStorage.removeItem("estabelecimentoCadastroSenha");
        localStorage.removeItem("estabelecimentoCadastroNome");
        localStorage.removeItem("estabelecimentoCadastroEndereco");
        localStorage.removeItem("estabelecimentoCadastroComplemento");
        localStorage.removeItem("estabelecimentoCadastroTelefone");
        localStorage.removeItem("estabelecimentoDados");



        /* ==========================================
           SUCESSO
        =========================================== */

        mostrarMensagemCadastro(
          "Cadastro realizado com sucesso!",
          "sucesso"
        );



        /* ==========================================
           VOLTA LOGIN
        =========================================== */

        setTimeout(() => {
          window.location.href =
            "login.html";
        }, 1400);

      });

  </script>

</body>

</html>
