<!DOCTYPE html>
<html lang="pt-br">

<head>

  <!-- ==========================================
       CONFIGURAûûES DA PûGINA
  =========================================== -->

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    Cadastro - Save Date
  </title>

  <!-- CSS -->
  <link
    rel="stylesheet"
    href="css/cadastro.css"
  >

</head>



<body>

  <!-- ==========================================
       CONTAINER PRINCIPAL
  =========================================== -->
  <div class="texto">


    <!-- ==========================================
         TOPO
    =========================================== -->
    <header class="topo">

      <div class="logo-area">

        <!-- LOGO -->
        <img
          src="img/logo.png"
          alt="Logo Save Date"
          class="logo"
        >

        <!-- TûTULO -->
        <h1 class="titulo">
          SAVE DATE
        </h1>

        <!-- SUBTûTULO -->
        <p class="subtitulo">

          <small>
            SALVA ENCONTROS
          </small>

        </p>

      </div>


      <!-- TûTULO -->
      <h3>
        Cadastrar usuûÀrio:
      </h3>

    </header>



    <!-- ==========================================
         FORMULûRIO
    =========================================== -->
    <form
      class="login-form"
      id="form-cadastro"
    >

      <!-- NOME -->
      <input
        type="text"
        id="nome"
        placeholder="Nome completo"
        required
      >


      <!-- EMAIL -->
      <input
        type="email"
        id="email"
        placeholder="Email"
        required
      >


      <!-- CPF -->
      <input
        type="text"
        id="cpf"
        placeholder="CPF"
        required
      >


      <!-- CEP -->
      <input
        type="text"
        id="cep"
        placeholder="CEP"
        required
        onblur="buscarCEP()"
      >


      <!-- ENDEREûO -->
      <input
        type="text"
        id="endereco"
        placeholder="EndereûÏo"
        readonly
        required
      >


      <!-- NûMERO -->
      <input
        type="text"
        id="numero"
        placeholder="Nû¤mero / Complemento"
        required
      >


      <!-- SENHA -->
      <input
        type="password"
        id="senha"
        placeholder="Senha"
        required
      >


      <!-- ERRO SENHA -->
      <div
        id="erroSenha"
        class="erro"
      ></div>



      <!-- BOTûO -->
      <button
        class="botao"
        type="submit"
      >

        Cadastrar

      </button>



      <!-- VOLTAR -->
      <button
        type="button"
        class="botao"
        onclick="window.location.href='tipo-de-conta.html'"
      >

        Voltar

      </button>

    </form>

  </div>





  <!-- ==========================================
       JAVASCRIPT
  =========================================== -->
  <script>

    /* ==========================================
       BUSCAR CEP
    =========================================== */

    function buscarCEP() {

      let cep =
        document
          .getElementById("cep")
          .value
          .replace("-", "");



      /* ==========================================
         VALIDA CEP
      =========================================== */

      if (cep.length !== 8) {

        alert("CEP invûÀlido!");

        return;

      }



      /* ==========================================
         BUSCA VIA CEP
      =========================================== */

      fetch(`https://viacep.com.br/ws/${cep}/json/`)

        .then(resposta => resposta.json())

        .then(dados => {


          /* CEP NûO ENCONTRADO */

          if (dados.erro) {

            alert("CEP nûÈo encontrado!");

            return;

          }



          /* PREENCHE ENDEREûO */

          document.getElementById("endereco").value =

            dados.logradouro +
            ", " +
            dados.bairro +
            " - " +
            dados.localidade;

        })


        .catch(() => {

          alert("Erro ao buscar CEP");

        });

    }






    /* ==========================================
       CADASTRO
    =========================================== */

    document
      .getElementById("form-cadastro")

      .addEventListener("submit", function(event) {

        // Impede recarregar
        event.preventDefault();



        /* ==========================================
           PEGAR VALORES
        =========================================== */

        const nome =
          document.getElementById("nome").value;

        const email =
          document.getElementById("email").value;

        const senha =
          document.getElementById("senha").value;

        const erro =
          document.getElementById("erroSenha");



        /* ==========================================
           VALIDA SENHA
        =========================================== */

        /*
          REGRAS:
          - mûÙnimo 6 caracteres
          - pelo menos 1 letra
          - pelo menos 1 sûÙmbolo
        */

        const regex =
          /^(?=.*[A-Za-z])(?=.*[@$!%*#?&]).{6,}$/;



        /* ==========================================
           SENHA INVûLIDA
        =========================================== */

        if (!regex.test(senha)) {

          erro.innerText =
            "MûÙnimo 6 caracteres, 1 letra e 1 sûÙmbolo.";

          return;

        }



        /* ==========================================
           LIMPA ERRO
        =========================================== */

        erro.innerText = "";



        /* ==========================================
           SALVA CADASTRO
        =========================================== */

        localStorage.setItem(
          "usuarioCadastro",
          email
        );

        localStorage.setItem(
          "senhaCadastro",
          senha
        );

        localStorage.setItem(
          "nomeCadastro",
          nome
        );



        /* ==========================================
           SUCESSO
        =========================================== */

        alert(
          "Cadastro realizado com sucesso!"
        );



        /* ==========================================
           VOLTA LOGIN
        =========================================== */

        window.location.href =
          "login.html";

      });

  </script>

</body>

</html>
