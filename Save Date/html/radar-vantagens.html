<!doctype html>
<html lang="pt-BR">
<head>
  <script src="js/tema.js"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Radar de Vantagens | Save Date</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/ferramentas.css" />
  <link rel="icon" type="image/x-icon" href="img/optimized/logo.png" />

  <!-- SCRIPT DE PROTEÇÃO -->
  <script src="js/auth.js"></script>
  <link rel="stylesheet" href="css/tema.css" />
</head>
<body>
  <header class="topo">
    <a href="home.html" class="logo-area"><img src="img/optimized/logo.png" alt="Save Date" /><span>Save Date</span></a>
    <nav class="nav-categorias">
      <a href="home.html" class="nav-link">Início</a>
      <a href="explorar.html" class="nav-link">Explorar</a>
      <a href="premium.html" class="nav-link nav-premium">★ Premium</a>
    </nav>
  </header>

  <section class="hero-ferramenta">
    <span class="etiqueta">Plus</span>
    <h1>Radar de Vantagens</h1>
    <p>Compare lugares com economia simulada e descubra onde seu rolê rende mais.</p>
  </section>

  <main class="conteudo">
    <div id="bloqueio"></div>
    <section class="painel ferramenta-premium">
      <h2>Buscar vantagens</h2>
      <div class="linha">
        <div class="campo">
          <label>Categoria</label>
          <select id="categoria">
            <option>Qualquer</option>
            <option>Restaurante</option>
            <option>Bar</option>
            <option>Shopping</option>
          </select>
        </div>
        <div class="campo">
          <label>Gasto estimado</label>
          <input id="gasto" type="number" value="160" min="0" />
        </div>
      </div>
      <button class="btn" id="calcular" type="button">Calcular economia</button>
    </section>
    <section class="painel ferramenta-premium" id="resultado" style="display:none;"></section>
  </main>

  <script src="js/dados.js"></script>
  <script src="js/premium.js"></script>
  <script>
    function permitido() {
      return typeof podeAcessarRecursoUsuario === "function" && podeAcessarRecursoUsuario();
    }

    if (!permitido()) {
      document.querySelectorAll(".ferramenta-premium").forEach((el) => el.style.display = "none");
      document.getElementById("bloqueio").innerHTML =
        '<div class="premium-lock">Ferramenta exclusiva para usuários Plus. <a href="premium.html">Ver planos</a></div>';
    }

    document.getElementById("calcular")?.addEventListener("click", () => {
      const categoria = document.getElementById("categoria").value;
      const gasto = Number(document.getElementById("gasto").value) || 0;
      let lista = lugaresData;
      if (categoria !== "Qualquer") lista = lista.filter((l) => l.categoria === categoria);
      lista = lista.slice(0, 6).map((l, i) => {
        const desconto = [8, 10, 12, 15, 18, 20][i % 6];
        return { lugar: l, desconto, economia: gasto * desconto / 100 };
      });

      document.getElementById("resultado").style.display = "block";
      document.getElementById("resultado").innerHTML = `
        <h2>Melhores vantagens</h2>
        <div class="mini-grid">
          ${lista.map((item) => `
            <div class="mini-card">
              <span>${item.lugar.nome}</span>
              <strong>${item.desconto}% off</strong>
              <p>Economia estimada: R$ ${item.economia.toFixed(2).replace(".", ",")}</p>
            </div>`).join("")}
        </div>`;
    });
  </script>
</body>
</html>
