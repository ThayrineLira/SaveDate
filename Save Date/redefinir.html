<!DOCTYPE html>
<html lang="pt-br">

<head>
  <script src="js/tema.js"></script>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Redefinir senha
    </title>

    <link
        rel="stylesheet"
        href="css/esqueci.css"
    >

  <link rel="stylesheet" href="css/tema.css" />
</head>

<body>

    <div class="texto">

        <!-- TOPO -->
        <header class="topo">

            <img
                src="img/optimized/logo.png"
                alt="Logo Save Date"
                class="logo"
            >

            <h1 class="titulo">
                SAVE DATE
            </h1>

            <p class="subtitulo">

                <small>
                    SALVA ENCONTROS
                </small>

            </p>

            <h3>
                Criar nova senha
            </h3>

            <p class="ajuda">Use ao menos 6 caracteres, com 1 letra e 1 símbolo.</p>

        </header>






        <!-- FORMULÁRIO -->
        <form id="form-redefinir">

            <!-- NOVA SENHA -->
            <div class="campo">
                <label for="novaSenha">Nova senha</label>
                <input
                    type="password"
                    id="novaSenha"
                    placeholder="Digite sua nova senha"
                    autocomplete="new-password"
                    required
                >
            </div>

            <!-- CONFIRMAR -->
            <div class="campo">
                <label for="confirmarSenha">Confirmar senha</label>
                <input
                    type="password"
                    id="confirmarSenha"
                    placeholder="Repita a nova senha"
                    autocomplete="new-password"
                    required
                >
            </div>

            <!-- BOTÃO -->
            <button
                type="submit"
                class="botao"
            >
                Salvar senha
            </button>

            <!-- MENSAGEM -->
            <p id="mensagem" aria-live="polite"></p>

        </form>

    </div>








    <script>

        /* ==========================================
           FORMULÁRIO
        ========================================== */

        const formulario =
            document.getElementById("form-redefinir");

        const mensagem =
            document.getElementById("mensagem");

        const emailParaRedefinir =
            localStorage.getItem("redefinirEmail");

        if (emailParaRedefinir) {
            mensagem.innerText =
                `Conta ${emailParaRedefinir} verificada. Crie sua nova senha abaixo.`;
            mensagem.style.color = "#667085";
        } else {
            mensagem.innerText =
                "Solicite a recuperação de senha primeiro.";
            mensagem.style.color = "red";
            setTimeout(() => {
                window.location.href = "esqueci.html";
            }, 2000);
        }





        /* ==========================================
           REDEFINIR SENHA
        ========================================== */

        formulario.addEventListener("submit", function(event){

            event.preventDefault();



            const novaSenha =
                document.getElementById("novaSenha").value;

            const confirmarSenha =
                document.getElementById("confirmarSenha").value;

            const mensagem =
                document.getElementById("mensagem");



            /* ==========================================
               SENHAS DIFERENTES
            ========================================== */

            if(novaSenha !== confirmarSenha){

                mensagem.innerText =
                    "As senhas não coincidem.";

                mensagem.style.color =
                    "red";

                return;

            }






            /* ==========================================
               VALIDA SENHA
            ========================================== */

            /*
              REGRAS:
              - mínimo 6 caracteres
              - 1 letra
              - 1 símbolo
            */

            const regex =
                /^(?=.*[A-Za-z])(?=.*[@$!%*#?&]).{6,}$/;



            if(!regex.test(novaSenha)){

                mensagem.innerText =
                    "A senha precisa ter 6 caracteres, 1 letra e 1 símbolo.";

                mensagem.style.color =
                    "red";

                return;

            }






            /* ==========================================
               SALVA NOVA SENHA
            ========================================== */

            const tipoRecuperacao =
                localStorage.getItem(
                    "redefinirTipo"
                );

            if (!tipoRecuperacao) {
                mensagem.innerText =
                    "Não foi possível redefinir a senha. Volte para recuperar sua conta.";
                mensagem.style.color =
                    "red";
                return;
            }

            if (tipoRecuperacao === "estabelecimento") {
                const estabelecimentos =
                    JSON.parse(
                        localStorage.getItem(
                            "cadastrosEstabelecimentos"
                        ) || "[]"
                    );

                const estabelecimento = estabelecimentos.find(
                    (item) =>
                        item.email ===
                        emailParaRedefinir
                );

                if (estabelecimento) {
                    estabelecimento.senha = novaSenha;
                    localStorage.setItem(
                        "cadastrosEstabelecimentos",
                        JSON.stringify(estabelecimentos)
                    );
                }

                localStorage.setItem(
                    "estabelecimentoCadastroSenha",
                    novaSenha
                );
            } else {
                const usuarios =
                    JSON.parse(
                        localStorage.getItem(
                            "cadastrosUsuarios"
                        ) || "[]"
                    );

                const usuario = usuarios.find(
                    (item) =>
                        item.email ===
                        emailParaRedefinir
                );

                if (usuario) {
                    usuario.senha = novaSenha;
                    localStorage.setItem(
                        "cadastrosUsuarios",
                        JSON.stringify(usuarios)
                    );
                }

                localStorage.setItem(
                    "usuarioCadastroSenha",
                    novaSenha
                );
            }

            localStorage.removeItem("redefinirEmail");
            localStorage.removeItem("redefinirTipo");






            /* ==========================================
               SUCESSO
            ========================================== */

            mensagem.innerText =
                tipoRecuperacao === "estabelecimento"
                    ? "Senha do estabelecimento alterada com sucesso! Agora você pode fazer login com a nova senha."
                    : "Senha alterada com sucesso! Agora você pode fazer login com sua nova senha.";

            mensagem.style.color =
                "green";






            /* ==========================================
               REDIRECIONA
            ========================================== */

            setTimeout(() => {

                window.location.href =
                    "login.html";

            }, 2000);

        });

    </script>

</body>

</html>
