<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Date Lab | Save Date</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/ferramentas.css" />
  <link rel="icon" type="image/x-icon" href="img/optimized/logo.png" />
</head>
<body>
  <header class="topo">
    <a href="home.html" class="logo-area"><img src="img/optimized/logo.png" alt="Save Date" /><span>Save Date</span></a>
    <nav class="nav-categorias">
      <a href="home.html" class="nav-link">Início</a>
      <a href="roteiro.html" class="nav-link">Planejador</a>
      <a href="premium.html" class="nav-link nav-premium">★ Premium</a>
    </nav>
  </header>

  <section class="hero-ferramenta">
    <span class="etiqueta">Plus</span>
    <h1>Date Lab</h1>
    <p>Gere uma ideia de encontro com começo, meio e final sem pensar demais.</p>
  </section>

  <main class="conteudo">
    <div id="bloqueio"></div>
    <section class="painel ferramenta-premium">
      <h2>Gerar ideia</h2>
      <div class="linha">
        <div class="campo">
          <label>Humor</label>
          <select id="humor">
            <option>Romântico</option>
            <option>Divertido</option>
            <option>Tranquilo</option>
            <option>Surpresa</option>
          </select>
        </div>
        <div class="campo">
          <label>Tempo disponível</label>
          <select id="tempo">
            <option>1 hora</option>
            <option>2 horas</option>
            <option>Noite inteira</option>
          </select>
        </div>
      </div>
      <button class="btn" id="gerar" type="button">Criar date</button>
    </section>
    <section class="painel ferramenta-premium" id="resultado" style="display:none;"></section>
  </main>

  <script src="js/dados.js"></script>
  <script src="js/premium.js"></script>
  <script>
    function permitido() {
      return typeof podeAcessarRecursoUsuario === "function" && podeAcessarRecursoUsuario();
    }

    if (!permitido()) {
      document.querySelectorAll(".ferramenta-premium").forEach((el) => el.style.display = "none");
      document.getElementById("bloqueio").innerHTML =
        '<div class="premium-lock">Date Lab é exclusivo para usuários Plus. <a href="premium.html">Ver planos</a></div>';
    }

    function pegar(categoria) {
      const lista = lugaresData.filter((l) => l.categoria === categoria);
      return lista[Math.floor(Math.random() * lista.length)] || lugaresData[0];
    }

    document.getElementById("gerar")?.addEventListener("click", () => {
      const humor = document.getElementById("humor").value;
      const tempo = document.getElementById("tempo").value;
      const inicio = humor === "Tranquilo" ? pegar("Parque") : pegar("Café");
      const principal = humor === "Divertido" ? pegar("Bar") : pegar("Restaurante");
      const final = tempo === "Noite inteira" ? pegar("Bar") : pegar("Shopping");

      document.getElementById("resultado").style.display = "block";
      document.getElementById("resultado").innerHTML = `
        <h2>${humor} · ${tempo}</h2>
        <div class="paradas">
          ${[inicio, principal, final].map((l, i) => `
            <div class="parada">
              <div class="parada-num">${i + 1}</div>
              <div class="parada-emoji">${l.emoji || "📍"}</div>
              <div class="parada-info"><h3>${l.nome}</h3><span>${l.categoria} · ${l.localizacao}</span></div>
              <div class="parada-preco">${l.preco === 0 ? "Grátis" : "R$ " + l.preco}</div>
            </div>`).join("")}
        </div>`;
    });
  </script>
</body>
</html>
