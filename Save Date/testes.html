<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Explorar Mapa — Save Date</title>

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap"
    rel="stylesheet"
  />
  <link rel="icon" type="image/x-icon" href="img/logo.png" />

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cor-primaria:  #ff5a5f;
      --cor-fundo:     #f8f8f8;
      --cor-painel:    #ffffff;
      --cor-texto:     #222;
      --cor-suave:     #888;
      --sombra:        0 2px 12px rgba(0,0,0,.10);
      --raio:          12px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--cor-fundo);
      color: var(--cor-texto);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── HEADER ── */
    .topo {
      background: var(--cor-painel);
      box-shadow: var(--sombra);
      padding: 0.75rem 1.25rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      z-index: 1000;
      flex-shrink: 0;
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      text-decoration: none;
      color: inherit;
    }

    .logo-area img { width: 32px; height: 32px; border-radius: 8px; }
    .logo-nome { font-size: 1rem; font-weight: 800; color: var(--cor-primaria); }

    /* ── BARRA DE BUSCA ── */
    .busca-mapa {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: #f2f2f2;
      border: 2px solid transparent;
      border-radius: 50px;
      padding: 0.4rem 0.5rem 0.4rem 1rem;
      transition: border-color .2s;
      max-width: 520px;
    }

    .busca-mapa:focus-within { border-color: var(--cor-primaria); }

    .busca-mapa input {
      flex: 1;
      border: none;
      background: transparent;
      font-size: 0.9rem;
      outline: none;
      color: var(--cor-texto);
    }

    .busca-mapa input::placeholder { color: #aaa; }

    .btn-buscar-mapa {
      background: var(--cor-primaria);
      color: #fff;
      border: none;
      border-radius: 50px;
      padding: 0.4rem 1rem;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background .2s;
    }

    .btn-buscar-mapa:hover    { background: #e04e53; }
    .btn-buscar-mapa:disabled { background: #ccc; cursor: not-allowed; }

    .btn-voltar {
      background: #f0f0f0;
      border: none;
      border-radius: 50px;
      padding: 0.4rem 0.9rem;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      color: #555;
      transition: background .2s;
      white-space: nowrap;
    }
    .btn-voltar:hover { background: #e0e0e0; }

    /* ── CATEGORIAS ── */
    .categorias-mapa {
      background: var(--cor-painel);
      border-bottom: 1px solid #eee;
      padding: 0.5rem 1.25rem;
      display: flex;
      gap: 0.5rem;
      overflow-x: auto;
      flex-shrink: 0;
      scrollbar-width: none;
    }
    .categorias-mapa::-webkit-scrollbar { display: none; }

    .cat-btn {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      background: #f2f2f2;
      border: 2px solid transparent;
      border-radius: 50px;
      padding: 0.3rem 0.85rem;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: all .2s;
      color: #555;
    }

    .cat-btn img { width: 18px; height: 18px; object-fit: contain; }

    .cat-btn.ativo,
    .cat-btn:hover {
      background: #fff0f0;
      border-color: var(--cor-primaria);
      color: var(--cor-primaria);
    }

    /* ── LAYOUT PRINCIPAL ── */
    .layout {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* ── PAINEL LATERAL ── */
    .painel {
      width: 340px;
      flex-shrink: 0;
      background: var(--cor-painel);
      border-right: 1px solid #eee;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .painel-header {
      padding: 0.85rem 1.1rem 0.6rem;
      border-bottom: 1px solid #eee;
      flex-shrink: 0;
    }

    .painel-titulo {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--cor-texto);
    }

    .painel-subtitulo {
      font-size: 0.75rem;
      color: var(--cor-suave);
      margin-top: 0.15rem;
    }

    .lista-lugares {
      flex: 1;
      overflow-y: auto;
      padding: 0.5rem;
    }

    /* ── CARD DO PAINEL ── */
    .card-lugar {
      display: flex;
      gap: 0.75rem;
      padding: 0.75rem;
      border-radius: var(--raio);
      cursor: pointer;
      transition: background .15s;
      border: 2px solid transparent;
    }

    .card-lugar:hover    { background: #fff5f5; }
    .card-lugar.selecionado {
      background: #fff0f0;
      border-color: var(--cor-primaria);
    }

    .card-lugar-foto {
      width: 64px;
      height: 64px;
      border-radius: 8px;
      object-fit: cover;
      flex-shrink: 0;
      background: #f0f0f0;
    }

    .card-lugar-placeholder {
      width: 64px;
      height: 64px;
      border-radius: 8px;
      background: linear-gradient(135deg, #ffe8e8, #ffd0d0);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      flex-shrink: 0;
    }

    .card-lugar-info { flex: 1; min-width: 0; }

    .card-lugar-nome {
      font-size: 0.85rem;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-lugar-tipo {
      font-size: 0.73rem;
      color: var(--cor-suave);
      margin-top: 0.1rem;
    }

    .card-lugar-nota {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      margin-top: 0.25rem;
      font-size: 0.75rem;
    }

    .estrela { color: #f5a623; }
    .nota-num { font-weight: 700; }
    .nota-total { color: #bbb; }

    .card-lugar-dist {
      font-size: 0.72rem;
      color: var(--cor-primaria);
      font-weight: 600;
      margin-top: 0.25rem;
    }

    /* ── MAPA ── */
    #mapa { flex: 1; z-index: 1; }

    /* ── POPUP LEAFLET customizado ── */
    .popup-save {
      min-width: 200px;
    }

    .popup-save .popup-nome {
      font-size: 0.9rem;
      font-weight: 700;
      margin-bottom: 0.3rem;
    }

    .popup-save .popup-tipo {
      font-size: 0.75rem;
      color: #888;
      margin-bottom: 0.4rem;
    }

    .popup-save .popup-nota {
      color: #f5a623;
      font-size: 0.8rem;
      margin-bottom: 0.5rem;
    }

    .popup-save .popup-btn {
      display: inline-block;
      background: #ff5a5f;
      color: #fff;
      text-decoration: none;
      border-radius: 50px;
      padding: 0.3rem 0.8rem;
      font-size: 0.75rem;
      font-weight: 600;
    }

    /* ── ESTADOS ── */
    .estado-vazio {
      padding: 2rem 1rem;
      text-align: center;
      color: var(--cor-suave);
      font-size: 0.85rem;
      line-height: 1.6;
    }

    .estado-vazio .icone { font-size: 2rem; margin-bottom: 0.5rem; }

    .skeleton-item {
      height: 80px;
      background: linear-gradient(90deg, #f0f0f0 25%, #e8e8e8 50%, #f0f0f0 75%);
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite;
      border-radius: var(--raio);
      margin-bottom: 0.5rem;
    }

    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .aviso-raio {
      font-size: 0.78rem;
      color: #e07b00;
      background: #fff8ee;
      border: 1px solid #ffd899;
      border-radius: 8px;
      padding: 0.4rem 0.8rem;
      margin: 0.4rem 0.5rem;
    }

    /* ── MOBILE ── */
    @media (max-width: 680px) {
      .painel { display: none; }
      .btn-voltar span { display: none; }
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <header class="topo">
    <a href="home.html" class="logo-area">
      <img src="img/logo.png" alt="Logo" />
      <span class="logo-nome">Save Date</span>
    </a>

    <div class="busca-mapa">
      <input
        type="text"
        id="input-local"
        placeholder="CEP ou endereço (ex: Av. Paulista, SP)"
        autocomplete="off"
      />
      <button class="btn-buscar-mapa" id="btn-buscar" onclick="buscarNoMapa()">
        🔍 Buscar
      </button>
    </div>

    <button class="btn-voltar" onclick="window.location.href='home.html'">
      ← <span>Voltar</span>
    </button>
  </header>

  <!-- CATEGORIAS -->
  <nav class="categorias-mapa" id="categorias">
    <button class="cat-btn ativo" data-categoria="bares">
      <img src="img/bar.png" alt="" /> Bares
    </button>
    <button class="cat-btn" data-categoria="restaurantes">
      <img src="img/restaurante.png" alt="" /> Restaurantes
    </button>
    <button class="cat-btn" data-categoria="parques">
      <img src="img/parque.png" alt="" /> Parques
    </button>
    <button class="cat-btn" data-categoria="cinema">
      <img src="img/cinema.png" alt="" /> Cinema
    </button>
    <button class="cat-btn" data-categoria="shopping">
      <img src="img/shopping.png" alt="" /> Shopping
    </button>
    <button class="cat-btn" data-categoria="festas">
      <img src="img/festas.png" alt="" /> Festas
    </button>
  </nav>

  <!-- LAYOUT -->
  <div class="layout">

    <!-- PAINEL LATERAL -->
    <aside class="painel">
      <div class="painel-header">
        <p class="painel-titulo" id="painel-titulo">Lugares próximos</p>
        <p class="painel-subtitulo" id="painel-sub">Busque um endereço para começar</p>
      </div>
      <div class="lista-lugares" id="lista-lugares">
        <div class="estado-vazio">
          <div class="icone">🗺️</div>
          Digite um CEP ou endereço<br />para ver lugares no mapa.
        </div>
      </div>
    </aside>

    <!-- MAPA -->
    <div id="mapa"></div>

  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  
</body>
</html>
