<!DOCTYPE html>
<html lang="pt-br">

<head>

    <!-- ==========================================
         CONFIGURAÇÕES
    =========================================== -->

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Recuperar senha
    </title>

    <!-- CSS -->
    <link
        rel="stylesheet"
        href="css/esqueci.css"
    >

    <!-- EMAILJS -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

</head>

<body>

    <!-- ==========================================
         CONTAINER PRINCIPAL
    =========================================== -->

    <div class="texto">


        <!-- ==========================================
             TOPO
        =========================================== -->

        <header class="topo">

            <!-- LOGO -->
            <img
                src="img/logo.png"
                alt="Logo Save Date"
                class="logo"
            >

            <!-- TÍTULO -->
            <h1 class="titulo">
                SAVE DATE
            </h1>

            <!-- SUBTÍTULO -->
            <p class="subtitulo">

                <small>
                    SALVA ENCONTROS
                </small>

            </p>

            <!-- TÍTULO -->
            <h3>
                Recuperar senha:
            </h3>

        </header>






        <!-- ==========================================
             FORMULÁRIO
        =========================================== -->

        <form id="form-recuperar">

            <!-- EMAIL -->
            <input
                type="email"
                id="email"
                placeholder="Digite seu email"
                required
            >


            <!-- BOTÃO -->
            <button
                type="submit"
                class="botao" >
                Enviar link </button>

        </form>





        <!-- ==========================================
             MENSAGEM
        =========================================== -->

        <p id="mensagem"></p>

    </div>









    <!-- ==========================================
         JAVASCRIPT
    =========================================== -->

    <script>

        /* ==========================================
           INICIA EMAILJS
        ========================================== */

        emailjs.init("2HZZBhBu3DyZErlD2");





        /* ==========================================
           FORMULÁRIO
        ========================================== */

        const formulario =
            document.getElementById("form-recuperar");



        const mensagem =
            document.getElementById("mensagem");






        /* ==========================================
           RECUPERAR SENHA
        ========================================== */

        formulario.addEventListener("submit", function(event){

            // Impede recarregar
            event.preventDefault();



            /* ==========================================
               EMAIL DIGITADO
            ========================================== */

            const emailDigitado =
                document.getElementById("email").value;



            /* ==========================================
               EMAIL CADASTRADO
            ========================================== */

            const emailCadastrado =
                localStorage.getItem("usuarioCadastro");



            /* ==========================================
               VERIFICA EMAIL
            ========================================== */

            if(emailDigitado === emailCadastrado){




                /* ==========================================
                   ENVIA EMAIL REAL
                ========================================== */

                emailjs.send(

                    "service_qymafzy",
                    "template_zi7asg8",

                    {
                        email: emailDigitado
                    }

                )

                .then(() => {




                    /* ==========================================
                       SUCESSO
                    ========================================== */

                    mensagem.innerText =
                        "Email de recuperação enviado com sucesso. Verifique seu email!";

                    mensagem.style.color =
                        "green";

                })






                /* ==========================================
                   ERRO EMAIL
                ========================================== */

                .catch(() => {

                    mensagem.innerText =
                        "Erro ao enviar email.";

                    mensagem.style.color =
                        "red";

                });

            }







            /* ==========================================
               EMAIL NÃO ENCONTRADO
            ========================================== */

            else{

                mensagem.innerText =
                    "Email não encontrado.";

                mensagem.style.color =
                    "red";

            }

        });

    </script>

</body>

</html>
