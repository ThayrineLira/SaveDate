<!DOCTYPE html>
<html lang="pt-br">

<head>

    <!-- ==========================================
         CONFIGURAÇÕES
    =========================================== -->

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Recuperar senha
    </title>

    <!-- CSS -->
    <link
        rel="stylesheet"
        href="css/esqueci.css"
    >

</head>

<body>

    <!-- ==========================================
         CONTAINER PRINCIPAL
    =========================================== -->

    <div class="texto">


        <!-- ==========================================
             TOPO
        =========================================== -->

        <header class="topo">

            <!-- LOGO -->
            <img
                src="img/logo.png"
                alt="Logo Save Date"
                class="logo"
            >

            <!-- TÍTULO -->
            <h1 class="titulo">
                SAVE DATE
            </h1>

            <!-- SUBTÍTULO -->
            <p class="subtitulo">

                <small>
                    SALVA ENCONTROS
                </small>

            </p>

            <!-- TÍTULO -->
            <h3>
                Recuperar senha:
            </h3>

        </header>






        <!-- ==========================================
             FORMULÁRIO
        =========================================== -->

        <form id="form-recuperar">

            <!-- EMAIL -->
            <input
                type="email"
                id="email"
                placeholder="Digite seu email"
                required
            >


            <!-- BOTÃO -->
            <button
                type="submit"
                class="botao" >
                Enviar link </button>

        </form>





        <!-- ==========================================
             MENSAGEM
        =========================================== -->

        <p id="mensagem"></p>

    </div>









    <!-- ==========================================
         JAVASCRIPT
    =========================================== -->

    <script>







        /* ==========================================
           FORMULÁRIO
        ========================================== */

        const formulario =
            document.getElementById("form-recuperar");



        const mensagem =
            document.getElementById("mensagem");






        /* ==========================================
           RECUPERAR SENHA
        ========================================== */

        formulario.addEventListener("submit", function(event){

            // Impede recarregar
            event.preventDefault();



            /* ==========================================
               EMAIL DIGITADO
            ========================================== */

            const emailDigitado =
                document.getElementById("email").value;



            /* ==========================================
               EMAIL CADASTRADO
            ========================================== */

            const emailNormalizado =
                emailDigitado.toLowerCase();

            const usuarios = JSON.parse(
                localStorage.getItem("cadastrosUsuarios") || "[]"
            );

            const estabelecimentos = JSON.parse(
                localStorage.getItem("cadastrosEstabelecimentos") || "[]"
            );

            const emailUsuario =
                usuarios.find(
                    (item) => item.email === emailNormalizado
                )?.email ||
                localStorage.getItem("usuarioCadastroEmail") ||
                localStorage.getItem("usuarioCadastro");

            const emailEstabelecimento =
                estabelecimentos.find(
                    (item) => item.email === emailNormalizado
                )?.email ||
                localStorage.getItem("estabelecimentoCadastroEmail");

            const tipoRecuperacao =
                emailNormalizado ===
                emailEstabelecimento
                    ? "estabelecimento"
                    : emailNormalizado ===
                    emailUsuario
                    ? "usuario"
                    : null;



            /* ==========================================
               VERIFICA EMAIL
            ========================================== */

            if (tipoRecuperacao) {

                localStorage.setItem(
                    "redefinirEmail",
                    emailNormalizado
                );

                localStorage.setItem(
                    "redefinirTipo",
                    tipoRecuperacao
                );

                mensagem.innerText =
                    "E-mail de recuperação enviado com sucesso. Você será redirecionado para redefinir sua senha.";

                mensagem.style.color =
                    "green";

                setTimeout(() => {
                    window.location.href =
                        "redefinir.html";
                }, 2500);












            }







            /* ==========================================
               EMAIL NÃO ENCONTRADO
            ========================================== */

            else{

                mensagem.innerText =
                    "Email não encontrado.";

                mensagem.style.color =
                    "red";

            }

        });

    </script>

</body>

</html>
