<!DOCTYPE html>
<html lang="pt-br">

<head>

    <!-- ==========================================
         CONFIGURAÇÕES
    =========================================== -->

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>
        Recuperar senha
    </title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/esqueci.css">

</head>

<body>

    <!-- ==========================================
         CONTAINER PRINCIPAL
    =========================================== -->

    <div class="texto">


        <!-- ==========================================
             TOPO
        =========================================== -->

        <header class="topo">

            <!-- LOGO -->
            <img src="img/logo.png" alt="Logo Save Date" class="logo">

            <!-- TÍTULO -->
            <h1 class="titulo">
                SAVE DATE
            </h1>

            <!-- SUBTÍTULO -->
            <p class="subtitulo">

                <small>
                    SALVA ENCONTROS
                </small>

            </p>

            <!-- TÍTULO -->
            <h3>
                Recuperar senha:
            </h3>

        </header>






        <!-- ==========================================
             FORMULÁRIO
        =========================================== -->

        <form id="form-recuperar">

            <!-- EMAIL -->
            <input type="email" id="email" placeholder="Digite seu email" required>


            <!-- BOTÃO -->
            <button type="submit" class="botao">
                Enviar link </button>

        </form>





        <!-- ==========================================
             MENSAGEM
        =========================================== -->

        <p id="mensagem"></p>

    </div>









    <!-- ==========================================
         JAVASCRIPT
    =========================================== -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

    <script>

        // ==========================================
        // INICIA EMAILJS
        // ==========================================

        emailjs.init("2HZZBhBu3DyZErlD2");



        // ==========================================
        // FORMULÁRIO
        // ==========================================

        const formulario =
            document.getElementById("form-recuperar");

        const mensagem =
            document.getElementById("mensagem");



        // ==========================================
        // RECUPERAR SENHA
        // ==========================================

        formulario.addEventListener("submit", function (event) {

            // Impede recarregar página
            event.preventDefault();



            // ==========================================
            // EMAIL DIGITADO
            // ==========================================

            const emailDigitado =
                document.getElementById("email").value;

            const emailNormalizado =
                emailDigitado.toLowerCase();



            // ==========================================
            // BUSCA DADOS NO LOCALSTORAGE
            // ==========================================

            const usuarios = JSON.parse(
                localStorage.getItem("cadastrosUsuarios") || "[]"
            );

            const estabelecimentos = JSON.parse(
                localStorage.getItem("cadastrosEstabelecimentos") || "[]"
            );



            // ==========================================
            // VERIFICA EMAIL USUÁRIO
            // ==========================================

            const emailUsuario =
                usuarios.find(
                    (item) => item.email === emailNormalizado
                )?.email ||
                localStorage.getItem("usuarioCadastroEmail") ||
                localStorage.getItem("usuarioCadastro");



            // ==========================================
            // VERIFICA EMAIL ESTABELECIMENTO
            // ==========================================

            const emailEstabelecimento =
                estabelecimentos.find(
                    (item) => item.email === emailNormalizado
                )?.email ||
                localStorage.getItem("estabelecimentoCadastroEmail");



            // ==========================================
            // DEFINE TIPO
            // ==========================================

            const tipoRecuperacao =
                emailNormalizado === emailEstabelecimento
                    ? "estabelecimento"
                    : emailNormalizado === emailUsuario
                        ? "usuario"
                        : null;



            // ==========================================
            // EMAIL ENCONTRADO
            // ==========================================

            if (tipoRecuperacao) {

                // SALVA DADOS
                localStorage.setItem(
                    "redefinirEmail",
                    emailNormalizado
                );

                localStorage.setItem(
                    "redefinirTipo",
                    tipoRecuperacao
                );



                // ==========================================
                // VARIÁVEIS DO TEMPLATE
                // ==========================================

                const parametros = {
                    email_usuario: emailDigitado
                };



                // ==========================================
                // ENVIA EMAIL
                // ==========================================

                emailjs.send(
                    "service_qymafzy",
                    "template_zi7asg8",
                    parametros
                )

                    .then(() => {

                        mensagem.innerText =
                            "E-mail de recuperação enviado com sucesso.";

                        mensagem.style.color =
                            "green";

                        formulario.reset();



                        // REDIRECIONA
                        setTimeout(() => {

                            window.location.href =
                                "redefinir.html";

                        }, 2500);

                    })

                    .catch((erro) => {

                        console.log(erro);

                        mensagem.innerText =
                            "Erro ao enviar e-mail.";

                        mensagem.style.color =
                            "red";

                    });

            }



            // ==========================================
            // EMAIL NÃO ENCONTRADO
            // ==========================================

            else {

                mensagem.innerText =
                    "Email não encontrado.";

                mensagem.style.color =
                    "red";

            }

        });

    </script>

</body>

</html>
