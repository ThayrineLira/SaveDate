<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Save Date | Explorar</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/explorar.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css" />
  <link rel="icon" type="image/x-icon" href="img/optimized/logo.png" />
</head>
<body>
  <nav class="nav">
    <a class="logo" href="home.html">
      <img src="img/optimized/logo.png" alt="Save Date Logo" class="logo-img" width="32" height="32" />
      Save Date
    </a>

    <div class="nav-links">
      <a href="home.html" class="nav-link">
        <i class="ti ti-home"></i> Início
      </a>
      <button class="nav-link active" type="button">
        <i class="ti ti-search"></i> Explorar
      </button>
      <a href="mapa.html" class="nav-link">
        <i class="ti ti-map-pin"></i> Mapa
      </a>
      <a href="salvos.html" class="nav-link">
        <i class="ti ti-heart"></i> Salvos
      </a>
      <a href="premium.html" class="nav-link nav-premium">
        ★ Premium
      </a>
    </div>
  </nav>

  <main class="body">
    <h1 class="page-title">Explorar</h1>
    <p class="page-sub">Encontre o lugar perfeito para o seu encontro</p>

    <div class="search">
      <i class="ti ti-search"></i>
      <input type="text" id="search-input" placeholder="Buscar lugares, bares, restaurantes..." />
    </div>

    <div class="chips" aria-label="Tipo de rolê">
      <button class="chip active" type="button" data-chip="Todos" onclick="selectChip(this)">✦ Todos</button>
      <button class="chip" type="button" data-chip="Amigos" onclick="selectChip(this)">👥 Amigos</button>
      <button class="chip" type="button" data-chip="Família" onclick="selectChip(this)">👨‍👩‍👧 Família</button>
      <button class="chip" type="button" data-chip="Casal" onclick="selectChip(this)">💕 Casal</button>
    </div>

    <div class="cats" aria-label="Categorias">
      <div class="cat active" onclick="selectCat(this, 'Todos')">
        <div class="cat-icon">🗂️</div>
        <div class="cat-label">Todos</div>
      </div>
      <div class="cat" onclick="selectCat(this, 'Restaurante')">
        <div class="cat-icon">🍽️</div>
        <div class="cat-label">Restaurante</div>
      </div>
      <div class="cat" onclick="selectCat(this, 'Bar')">
        <div class="cat-icon">🍺</div>
        <div class="cat-label">Bar</div>
      </div>
      <div class="cat" onclick="selectCat(this, 'Lanchonete')">
        <div class="cat-icon">🍔</div>
        <div class="cat-label">Lanchonete</div>
      </div>
      <div class="cat" onclick="selectCat(this, 'Pizzaria')">
        <div class="cat-icon">🍕</div>
        <div class="cat-label">Pizzaria</div>
      </div>
      <div class="cat" onclick="selectCat(this, 'Café')">
        <div class="cat-icon">☕</div>
        <div class="cat-label">Café</div>
      </div>
      <div class="cat" onclick="selectCat(this, 'Shopping')">
        <div class="cat-icon">🛍️</div>
        <div class="cat-label">Shopping</div>
      </div>
      <div class="cat" onclick="selectCat(this, 'Parque')">
        <div class="cat-icon">🌳</div>
        <div class="cat-label">Parque</div>
      </div>
      <div class="cat" onclick="selectCat(this, 'Sorveteria')">
        <div class="cat-icon">🍨</div>
        <div class="cat-label">Sorveteria</div>
      </div>
    </div>

    <section class="budget" aria-label="Orçamento por pessoa">
      <div class="budget-header">
        <div class="budget-label">💲 Orçamento por pessoa</div>
        <div class="budget-val" id="budget-val">R$200+</div>
      </div>

      <input type="range" id="budget-range" min="10" max="200" value="200" oninput="updateBudget(this.value)" />

      <div class="range-labels">
        <span>R$10</span>
        <span>R$50</span>
        <span>R$100</span>
        <span>R$200+</span>
      </div>
    </section>

    <div class="toolbar" aria-label="Ordenar e filtrar">
      <label class="toolbar-item">
        <span>Ordenar</span>
        <select id="ordenar" onchange="setOrdenar(this.value)">
          <option value="relevancia">Relevância</option>
          <option value="preco-asc">Menor preço</option>
          <option value="preco-desc">Maior preço</option>
          <option value="nota">Melhor avaliados</option>
          <option value="distancia">Mais perto de mim</option>
        </select>
      </label>
      <label class="toolbar-item">
        <span>Bairro</span>
        <select id="bairro" onchange="setBairro(this.value)">
          <option value="Todos">Todos</option>
        </select>
      </label>
      <button type="button" class="toolbar-toggle" id="toggle-aberto" onclick="toggleAberto()">🕒 Aberto agora</button>
      <button type="button" class="toolbar-btn" id="btn-perto" onclick="ativarPertoDeMim()">📍 Perto de mim</button>
    </div>

    <p class="found"><span id="count">0</span> lugares encontrados</p>
    <section class="cards-grid" id="cards-grid"></section>
  </main>

  <script src="js/dados.js"></script>
  <script src="js/premium.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/cards.js"></script>
  <script src="js/explorar.js"></script>
</body>
</html>
